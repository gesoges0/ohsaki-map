<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>物件メモ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; }
    #nav { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; background: #fff; border-radius: 6px; padding: 6px 14px; box-shadow: 0 1px 5px rgba(0,0,0,.3); font-size: 13px; }
    #nav a { color: #3388ff; text-decoration: none; margin: 0 8px; }
    #nav a:hover { text-decoration: underline; }
    #map { height: 100vh; }
    .popup-name { font-weight: bold; font-size: 14px; }
    .popup-rent { color: #e44; font-size: 13px; }
    .popup-info { font-size: 12px; color: #555; }
    .popup-link { font-size: 12px; }
  </style>
</head>
<body>
<div id="nav"><a href="index.html">地図で見る</a><a href="table.html">表で見る</a></div>
<div id="map"></div>

  }).addTo(map).bindPopup('アートヴィレッジ大崎セントラルタワーから半径2km');

  properties.forEach(p => {

      <div class="popup-name">${p.name}</div>
      <div class="popup-rent">${p.rent}</div>
      <div class="popup-info">${p.walk}</div>
      <div class="popup-info">${p.layout} | ${p.built}</div>
      <div class="popup-link"><a href="${p.url}" target="_blank">SUUMOで見る</a></div>

</body>
